services:
    api:
        container_name: carparking-api
        build:
            context: .
            dockerfile: CarParking.Api/Dockerfile
        environment:
            ASPNETCORE_ENVIRONMENT: Docker
            ASPNETCORE_URLS: http://+:8080
        ports:
            - '8080:8080'
        depends_on:
            db:
                condition: service_healthy
        networks:
            - dev

    db:
        container_name: db
        image: postgres:16.4-alpine
        environment:
            POSTGRES_DB: CarParking
            POSTGRES_USER: testuser
            POSTGRES_PASSWORD: testpassword
        ports:
            - '5432:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U testuser -d CarParking']
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./scripts/initial_migration.sql:/docker-entrypoint-initdb.d/01-initial_migration.sql:ro
        networks:
            - dev

networks:
    dev:
        driver: bridge

volumes:
    postgres_data:
